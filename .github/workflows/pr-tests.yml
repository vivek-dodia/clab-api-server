name: Pull Request Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-image-arch:
    name: Container image architecture
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: WillAbides/setup-go-faster@v1.15.0
        with:
          go-version: "1.24.x"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-container-image-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Configure apt and install cross tool-chain
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture arm64
          sudo sed -Ei 's|http://azure\.archive\.ubuntu\.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list
          sudo sed -Ei 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          EOF
          for i in {1..5}; do sudo apt-get update -qq && break || sleep 5; done
          for i in {1..5}; do \
            sudo apt-get install -y --no-install-recommends \
              build-essential \
              file \
              gcc-aarch64-linux-gnu \
              linux-libc-dev:arm64 \
              libpam0g-dev \
              libpam0g-dev:arm64 \
            && break || { sudo apt-get -y --fix-broken install || true; sleep 5; }; \
          done

      - name: Build release binaries
        run: |
          set -euxo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
          go build -trimpath -o dist/clab-api-server-linux-amd64 ./cmd/server
          CC=aarch64-linux-gnu-gcc \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
          go build -trimpath -o dist/clab-api-server-linux-arm64 ./cmd/server
          chmod +x dist/clab-api-server-linux-*

      - name: Verify release binary architectures
        run: |
          set -euxo pipefail
          file dist/clab-api-server-linux-amd64 | tee /tmp/clab-api-server-linux-amd64.file
          file dist/clab-api-server-linux-arm64 | tee /tmp/clab-api-server-linux-arm64.file
          grep -q 'x86-64' /tmp/clab-api-server-linux-amd64.file
          grep -q 'ARM aarch64' /tmp/clab-api-server-linux-arm64.file

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and smoke test amd64 image
        run: |
          set -euxo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t clab-api-server-ci:amd64 \
            -f ./docker/simple-container/Dockerfile \
            .
          docker run --rm \
            --platform linux/amd64 \
            --entrypoint /usr/local/bin/clab-api-server \
            clab-api-server-ci:amd64 \
            -v

      - name: Build and smoke test arm64 image
        run: |
          set -euxo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t clab-api-server-ci:arm64 \
            -f ./docker/simple-container/Dockerfile \
            .
          docker run --rm \
            --platform linux/arm64 \
            --entrypoint /usr/local/bin/clab-api-server \
            clab-api-server-ci:arm64 \
            -v

  tests-go:
    name: API + containerlab tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure runner workspace env (act compatibility)
        if: env.RUNNER_WORKSPACE == ''
        run: echo "RUNNER_WORKSPACE=${GITHUB_WORKSPACE}/.runner-workspace" >>
          "$GITHUB_ENV"

      - name: Generate tests_go/.env
        run: |
          if [ ! -f tests_go/.env ]; then
            cp tests_go/.env.example tests_go/.env
          fi
      - name: Generate root .env
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Set up Go
        uses: WillAbides/setup-go-faster@v1.15.0
        with:
          go-version: "1.24.x"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install go-task
        run: |
          curl -sSL https://taskfile.dev/install.sh | sudo sh -s -- -b /usr/local/bin
          task --version

      - name: Install Go test tooling
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/FloSch62/go-test2html@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpam0g-dev curl

      - name: Install containerlab
        run: |
          curl -fsSL https://get.containerlab.dev | sudo -E bash
          containerlab version

      - name: Containerlab CLI smoke test
        run: |
          cat <<'EOF' >/tmp/pr-smoke.clab.yml
          name: pr-smoke
          topology:
            nodes:
              srl1:
                kind: linux
                image: ghcr.io/srl-labs/network-multitool:latest
              srl2:
                kind: linux
                image: ghcr.io/srl-labs/network-multitool:latest
            links:
              - endpoints: ["srl1:eth1", "srl2:eth1"]
          EOF
          sudo containerlab deploy \
            --network act-pr-smoke \
            --ipv4-subnet 172.31.20.0/24 \
            --ipv6-subnet 2001:db8:ac:20::/64 \
            -t /tmp/pr-smoke.clab.yml
          sudo containerlab inspect -t /tmp/pr-smoke.clab.yml
          sudo containerlab destroy -t /tmp/pr-smoke.clab.yml --cleanup --yes

      - name: Prepare Linux users for tests_go
        run: sudo scripts/setup-tests-go-env.sh

      - name: Build API server
        env:
          CGO_ENABLED: 1
        run: |
          go build -trimpath -o dist/clab-api-server ./cmd/server

      - name: Start API server
        run: |
          sudo bash -c "cd '$PWD' && env API_SERVER_HOST=127.0.0.1 ./dist/clab-api-server -env-file .env > server.log 2>&1 & echo \$! > server.pid"
          sudo chown "$USER:$USER" server.log server.pid
          sleep 5

      - name: Wait for API readiness
        run: timeout 60 bash -c 'until curl -kfsS https://127.0.0.1:8090/health
          >/dev/null; do sleep 2; done'

      - name: Run Task tests
        env:
          GOTEST_LOG_LEVEL: debug
        run: task test

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            sudo kill "$(cat server.pid)" || true
          fi

      - name: Dump API server logs
        if: always()
        run: |
          if [ -f server.log ]; then
            cat server.log
          fi

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-report
          path: test-reports/test-report.html
          if-no-files-found: warn

      - name: Cleanup leftover labs
        if: always()
        run: |
          sudo containerlab destroy --all --cleanup --yes || true
